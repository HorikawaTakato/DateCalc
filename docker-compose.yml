services:

  # ── Nginx リバースプロキシ ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  # ── Flask + Gunicorn (DateCalc) ───────────────────────────────────────────
  web:
    image: ghcr.io/horikawatakato/datecalc:latest
    expose:
      - "8000"           # Nginx からのみアクセス可。外部には公開しない。
    healthcheck:
      # /api/today は軽量なので healthcheck に使う
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/today')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
