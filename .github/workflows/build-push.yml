name: Build and Push to GHCR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: horikawatakato/datecalc
  NGINX_IMAGE_NAME: horikawatakato/datecalc-nginx

jobs:
  # ── テストジョブ ────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      # ── ① コードのチェックアウト ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── ② Python のセットアップ ───────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'  # pip キャッシュで依存インストールを高速化

      # ── ③ 依存関係のインストール ──────────────────────────────────────────
      - name: Install dependencies
        working-directory: ./app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # flask, gunicorn をインストール
          pip install pytest               # テスト用に追加

      # ── ④ テストの実行 ────────────────────────────────────────────────────
      #      テストが失敗した場合、後続の build-and-push ジョブは実行されない
      - name: Run tests
        working-directory: ./app
        run: pytest --tb=short -v

  # ── ビルド＆プッシュジョブ ──────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: test  # test ジョブが成功した場合のみ実行
    permissions:
      contents: read   # リポジトリのコード読み取り
      packages: write  # GHCR へのイメージ Push

    steps:
      # ── ① コードのチェックアウト ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── ② GITHUB_TOKEN で GHCR に自動ログイン ──────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # 追加シークレット不要

      # ── ③ タグ・ラベルを自動生成 ────────────────────────────────────────────
      #      push イベントに応じて以下のタグを生成:
      #        main ブランチ push → latest / sha-xxxxxxx
      #        v1.2.3 タグ push  → 1.2.3 / 1.2 / 1 / latest
      #        PR               → pr-<番号>（Push はスキップ）
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── ④ BuildKit 有効化（マルチアーキテクチャ対応・キャッシュ最適化）──────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── ⑤ イメージのビルド＆GHCR へ Push ──────────────────────────────────
      #      PR の場合は Push せず、ビルド確認のみ行う
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./app         # ビルドコンテキストを app/ に変更
          file: ./app/Dockerfile  # Dockerfile のパスを明示
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHCR をキャッシュストアに利用してビルドを高速化
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max
          # Dockerfile の ARG にビルド日時とコミットSHA を渡す
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            GIT_REVISION=${{ github.sha }}

      # ── ⑥ Nginx イメージのビルド＆GHCR へ Push ────────────────────────────
      #      nginx.conf を含んだカスタム Nginx イメージをビルドして Push する
      - name: Extract metadata for nginx image
        id: meta-nginx
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.NGINX_IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v7
        with:
          context: ./nginx         # ビルドコンテキストを nginx/ に変更
          file: ./nginx/Dockerfile  # Nginx 用 Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-nginx.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.NGINX_IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.NGINX_IMAGE_NAME }}:cache,mode=max

      # ── ⑦ Push されたイメージの digest をサマリーに出力 ────────────────────
      - name: Output image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "## ✅ Image pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${{ env.REGISTRY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── ECS デプロイジョブ ────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push  # ビルド成功後のみ実行
    if: github.event_name != 'pull_request'  # PR 時はデプロイしない

    permissions:
      id-token: write  # OIDC 認証に必要
      contents: read

    steps:
      # ── ① コードのチェックアウト ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── ② AWS 認証（OIDC）────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── ③ 実行中の古いタスクを停止してポートを解放 ──────────────────────────
      #      EC2起動タイプではポート80が占有されると新タスクが起動できないため
      #      デプロイ前に古いタスクを停止する
      - name: Stop running tasks
        run: |
          TASK_ARNS=$(aws ecs list-tasks \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service-name ${{ secrets.ECS_SERVICE }} \
            --desired-status RUNNING \
            --region ${{ secrets.AWS_REGION }} \
            --query 'taskArns' \
            --output text)
          if [ -n "$TASK_ARNS" ]; then
            for TASK_ARN in $TASK_ARNS; do
              echo "Stopping task: $TASK_ARN"
              aws ecs stop-task \
                --cluster ${{ secrets.ECS_CLUSTER }} \
                --task $TASK_ARN \
                --region ${{ secrets.AWS_REGION }}
            done
            echo "Waiting for tasks to stop..."
            sleep 15
          fi

      # ── ④ 短縮 SHA を生成 ────────────────────────────────────────────────
      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      # ── ⑤ タスク定義の web コンテナイメージを最新の SHA タグで更新 ──────────
      - name: Render ECS task definition for web
        id: task-def-web
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: web
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.short-sha.outputs.sha }}

      # ── ⑥ タスク定義の nginx コンテナイメージを最新の SHA タグで更新 ─────────
      - name: Render ECS task definition for nginx
        id: task-def-nginx
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-web.outputs.task-definition }}
          container-name: nginx
          image: ${{ env.REGISTRY }}/${{ env.NGINX_IMAGE_NAME }}:sha-${{ steps.short-sha.outputs.sha }}

      # ── ⑦ ECS サービスにデプロイ ────────────────────────────────────────────
      #      デプロイ完了まで待機（タイムアウト：10分）
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def-nginx.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true
