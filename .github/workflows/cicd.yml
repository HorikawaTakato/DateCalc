name: CICD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── 同時実行制御（ジョブ単位で制御）──────────────────────────────────────────
#    ワークフロー全体に cancel-in-progress: true を付けると、実行中の deploy
#    まで巻き込んでキャンセルされる（ECS 側のロールアウトは止まらず競合するため
#    危険）。そのため concurrency は各ジョブに個別指定する:
#      - test / build / push : 共通グループ(ci-*)で cancel-in-progress: true。
#          追い越された古いコミットの実行を打ち切り、最新コミットを優先する。
#      - deploy              : 専用グループ(deploy-*)で cancel-in-progress: false。
#          実行中はキャンセルせず、新しい実行は前のデプロイ完了まで待機（直列化）。

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: horikawatakato/datecalc
  NGINX_IMAGE_NAME: horikawatakato/datecalc-nginx

jobs:
  # ── テストジョブ ────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # CI 段階の共通グループ。追い越された実行はキャンセルして最新を優先
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: none
      id-token: none

    steps:
      # ── ① コードのチェックアウト ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── ② Python のセットアップ ───────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'  # pip キャッシュで依存インストールを高速化

      # ── ③ 依存関係のインストール ──────────────────────────────────────────
      - name: Install dependencies
        working-directory: ./app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # flask, gunicorn をインストール
          pip install pytest               # テスト用に追加

      # ── ④ テストの実行 ────────────────────────────────────────────────────
      #      テストが失敗した場合、後続の build ジョブは実行されない
      - name: Run tests
        working-directory: ./app
        run: pytest --tb=short -v

  # ── ビルドジョブ ────────────────────────────────────────────────────────────
  #    Web・Nginx 両イメージをビルドし、tar として artifact に保存する
  #    GHCR への Push は行わない（PR 時もビルド確認が可能）
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test  # test ジョブが成功した場合のみ実行
    # test と同一の CI グループ。追い越された実行はキャンセル
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: none
      id-token: none

    outputs:
      # push ジョブへタグを引き渡す
      web_tags:    ${{ steps.meta.outputs.tags }}
      nginx_tags:  ${{ steps.meta-nginx.outputs.tags }}

    steps:
      # ── ① コードのチェックアウト ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── ② タグ・ラベルを自動生成（Web）──────────────────────────────────────
      #      これらのタグは人間向けの参照・トレーサビリティ用途。
      #      デプロイは下流で取得する manifest digest（@sha256:...）で行うため、
      #      タグの桁数や可変性に依存しない。
      #      生成タグ:
      #        sha-<短縮SHA> / main ブランチ push → latest / PR → pr-<番号>
      - name: Extract metadata for web image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── ③ タグ・ラベルを自動生成（Nginx）────────────────────────────────────
      - name: Extract metadata for nginx image
        id: meta-nginx
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.NGINX_IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── ④ BuildKit 有効化（キャッシュ最適化）────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── ⑤ Web イメージのビルド（単一プラットフォーム・Push なし・tar で出力）─
      #      type=docker は単一プラットフォーム向け。docker load で読み込める
      #      ローカル tar を生成し、push ジョブへ artifact 経由で引き渡す。
      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: ./app          # ビルドコンテキストを app/ に変更
          file: ./app/Dockerfile  # Dockerfile のパスを明示
          push: false             # このジョブでは Push しない
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=/tmp/web.tar  # ローカル tar に保存
          # Dockerfile の ARG にビルド日時とコミットSHA を渡す
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            GIT_REVISION=${{ github.sha }}

      # ── ⑥ Nginx イメージのビルド（単一プラットフォーム・Push なし・tar で出力）
      #      nginx.conf を含んだカスタム Nginx イメージをビルドする
      - name: Build nginx image
        uses: docker/build-push-action@v7
        with:
          context: ./nginx          # ビルドコンテキストを nginx/ に変更
          file: ./nginx/Dockerfile  # Nginx 用 Dockerfile
          push: false               # このジョブでは Push しない
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}  # web と同様に OCI ラベルを付与
          outputs: type=docker,dest=/tmp/nginx.tar  # ローカル tar に保存

      # ── ⑦ ビルド済み tar を artifact としてアップロード ─────────────────────
      #      push ジョブへ引き渡す（PR 時はアップロードのみで push ジョブはスキップ）
      #      PR 時は push ジョブがスキップされ成果物が消費されないため、
      #      アップロード自体を行わない（ストレージの無駄を避ける）。
      - name: Upload web image artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: web-image
          path: /tmp/web.tar
          retention-days: 1  # 同一ワークフローの push ジョブで消費されるため 1 日で十分

      - name: Upload nginx image artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: nginx-image
          path: /tmp/nginx.tar
          retention-days: 1

  # ── プッシュジョブ ──────────────────────────────────────────────────────────
  #    build ジョブの artifact を取得し、Web → Nginx の順で GHCR へ Push する
  #    PR 時はスキップ
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build  # build ジョブが成功した場合のみ実行
    if: github.event_name != 'pull_request'  # PR 時はスキップ
    # test/build と同一の CI グループ。追い越された実行はキャンセル
    #（新しい実行が全タグを push し直すため、途中キャンセルでも最終的に整合する）
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write  # GHCR へのイメージ Push
      id-token: none

    outputs:
      # deploy ジョブへ、実際に push した manifest digest を引き渡す
      web_digest:   ${{ steps.push-web.outputs.digest }}
      nginx_digest: ${{ steps.push-nginx.outputs.digest }}

    steps:
      # ── ① GITHUB_TOKEN で GHCR に自動ログイン ──────────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # 追加シークレット不要

      # ── ② Web イメージ tar をダウンロード ────────────────────────────────────
      - name: Download web image artifact
        uses: actions/download-artifact@v7
        with:
          name: web-image
          path: /tmp

      # ── ③ Web イメージを Docker にロードして GHCR へ Push ────────────────────
      #      全タグを push 後、レジストリ上の manifest digest を取得して出力する。
      #      同一イメージのタグはすべて同じ digest を指すため、先頭タグから取得する。
      - name: Push web image
        id: push-web
        env:
          WEB_TAGS: ${{ needs.build.outputs.web_tags }}
        run: |
          set -euo pipefail
          docker load --input /tmp/web.tar
          # build ジョブで付与したタグをすべて Push する
          echo "$WEB_TAGS" | while read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done
          # 先頭タグを取得（pipefail+head の SIGPIPE を避けるためパラメータ展開を使用）
          first_tag=${WEB_TAGS%%$'\n'*}
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$first_tag" | cut -d'@' -f2)
          # digest が空のまま下流に渡ると不正な image 参照になるため即 fail させる
          if [ -z "$digest" ]; then
            echo "::error::web イメージの digest を取得できませんでした"; exit 1
          fi
          echo "Web image digest: $digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      # ── ④ Nginx イメージ tar をダウンロード ──────────────────────────────────
      - name: Download nginx image artifact
        uses: actions/download-artifact@v7
        with:
          name: nginx-image
          path: /tmp

      # ── ⑤ Nginx イメージを Docker にロードして GHCR へ Push ──────────────────
      - name: Push nginx image
        id: push-nginx
        env:
          NGINX_TAGS: ${{ needs.build.outputs.nginx_tags }}
        run: |
          set -euo pipefail
          docker load --input /tmp/nginx.tar
          echo "$NGINX_TAGS" | while read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done
          # 先頭タグを取得（pipefail+head の SIGPIPE を避けるためパラメータ展開を使用）
          first_tag=${NGINX_TAGS%%$'\n'*}
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$first_tag" | cut -d'@' -f2)
          # digest が空のまま下流に渡ると不正な image 参照になるため即 fail させる
          if [ -z "$digest" ]; then
            echo "::error::nginx イメージの digest を取得できませんでした"; exit 1
          fi
          echo "Nginx image digest: $digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      # ── ⑥ Push されたイメージの情報をサマリーに出力 ───────────────────────────
      - name: Output image digest
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          NGINX_IMAGE_NAME: ${{ env.NGINX_IMAGE_NAME }}
          WEB_TAGS: ${{ needs.build.outputs.web_tags }}
          NGINX_TAGS: ${{ needs.build.outputs.nginx_tags }}
          WEB_DIGEST: ${{ steps.push-web.outputs.digest }}
          NGINX_DIGEST: ${{ steps.push-nginx.outputs.digest }}
        run: |
          echo "## ✅ Images pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${REGISTRY}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Image | \`${IMAGE_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Tags | \`${WEB_TAGS}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Digest | \`${WEB_DIGEST}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Nginx Image | \`${NGINX_IMAGE_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Nginx Tags | \`${NGINX_TAGS}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Nginx Digest | \`${NGINX_DIGEST}\` |" >> $GITHUB_STEP_SUMMARY

  # ── ECS デプロイジョブ ────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: push  # push ジョブが成功した場合のみ実行
    if: github.event_name != 'pull_request'  # PR 時はデプロイしない
    # デプロイ専用グループ。実行中はキャンセルせず、後続の実行は完了まで待機（直列化）
    concurrency:
      group: deploy-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      contents: read
      packages: none
      id-token: write  # OIDC 認証に必要

    steps:
      # ── ① コードのチェックアウト ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── ② AWS 認証（OIDC）────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          # AWS_REGION は非機密情報のため Variables（vars.*）で管理する
          aws-region: ${{ vars.AWS_REGION }}

      # ── ③ タスク定義のプレースホルダーを Variables の値で置換 ──────────────
      #      task-definition.json の __EXECUTION_ROLE_ARN__ を実際の ARN に差し替える
      #      AWSアカウントIDを含む ARN をリポジトリにハードコードしないための措置
      - name: Inject executionRoleArn
        env:
          EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
        run: |
          set -euo pipefail
          # 値が未設定だとプレースホルダを空文字で置換して壊れた ARN になるため事前チェック
          if [ -z "${EXECUTION_ROLE_ARN}" ]; then
            echo "::error::vars.ECS_EXECUTION_ROLE_ARN が未設定です"; exit 1
          fi
          sed -i "s|__EXECUTION_ROLE_ARN__|${EXECUTION_ROLE_ARN}|g" \
            task-definition.json

      # ── ④ タスク定義の web コンテナイメージを manifest digest で更新 ─────────
      #      タグではなく push ジョブが取得した不変の digest（@sha256:...）を参照する。
      #      タグの上書き・桁数差・再タグ付けに左右されず、ビルドした成果物そのものを
      #      確実にデプロイできる。
      - name: Render ECS task definition for web
        id: task-def-web
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: web
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.push.outputs.web_digest }}

      # ── ⑤ タスク定義の nginx コンテナイメージを manifest digest で更新 ───────
      - name: Render ECS task definition for nginx
        id: task-def-nginx
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-web.outputs.task-definition }}
          container-name: nginx
          image: ${{ env.REGISTRY }}/${{ env.NGINX_IMAGE_NAME }}@${{ needs.push.outputs.nginx_digest }}

      # ── ⑥ ECS サービスにデプロイ ────────────────────────────────────────────
      #      ローリングデプロイは ECS サービスのデプロイ構成に委ねる。
      #      EC2 起動タイプでポート80を共有する場合は、サービス側で
      #        minimumHealthyPercent = 0 / maximumPercent = 100
      #      を設定し、「古いタスクを停止 → ポート解放 → 新タスク起動」の順で
      #      ECS スケジューラに処理させること（手動 stop-task は競合するため廃止）。
      #      デプロイ完了まで待機する。
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def-nginx.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true  # デプロイ完了まで待機（timeout-minutes: 30 で上限制御）
