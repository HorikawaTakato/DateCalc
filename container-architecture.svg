<svg width="100%" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>コンテナ構成図</title>
  <desc>インターネットからブラウザがElastic IPでEC2上のECSタスクにアクセスし、NginxコンテナがGunicorn+Flaskコンテナに転送する構成。GHCRからイメージを取得する。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Internet / Browser -->
  <g font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="16px">
    <rect x="40" y="20" width="600" height="64" rx="12" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)" stroke-width="0.5"/>
    <text x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="rgb(68, 68, 65)" font-size="14px" font-weight="500">インターネット</text>
    <text x="340" y="62" text-anchor="middle" dominant-baseline="central" fill="rgb(95, 94, 90)" font-size="12px">http://ec2-3-114-247-73.ap-northeast-1.compute.amazonaws.com</text>
  </g>

  <!-- AWS Region outer box -->
  <g font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>
    <rect x="40" y="118" width="600" height="430" rx="16" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)" stroke-width="0.5"/>
    <text x="68" y="140" dominant-baseline="central" fill="rgb(12, 68, 124)" font-size="14px" font-weight="500">AWS（ap-northeast-1 東京リージョン）</text>
  </g>

  <!-- EC2 instance box -->
  <g font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>
    <rect x="64" y="162" width="552" height="362" rx="12" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)" stroke-width="0.5"/>
    <text x="92" y="184" dominant-baseline="central" fill="rgb(8, 80, 65)" font-size="14px" font-weight="500">EC2 インスタンス（t3.micro）</text>
    <text x="92" y="200" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12px">Elastic IP（固定）</text>
  </g>

  <!-- ECS Task box -->
  <g font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>
    <rect x="88" y="222" width="504" height="278" rx="10" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)" stroke-width="0.5"/>
    <text x="116" y="244" dominant-baseline="central" fill="rgb(60, 52, 137)" font-size="14px" font-weight="500">ECS タスク（datecalc-task）</text>
  </g>

  <!-- Arrow: Internet -> AWS -->
  <line x1="340" y1="84" x2="340" y2="262" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5" fill="none"/>
  <text x="350" y="100" dominant-baseline="central" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px">ポート 80</text>

  <!-- Nginx container -->
  <g font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>
    <rect x="112" y="262" width="456" height="80" rx="8" fill="rgb(250, 236, 231)" stroke="rgb(153, 60, 29)" stroke-width="0.5"/>
    <text x="340" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(113, 43, 19)" font-size="14px" font-weight="500">nginx コンテナ</text>
    <text x="340" y="300" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="12px">ghcr.io/horikawatakato/datecalc-nginx</text>
    <text x="340" y="320" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="12px">リバースプロキシ・静的ファイル配信</text>
  </g>

  <!-- Arrow: nginx -> web -->
  <line x1="340" y1="342" x2="340" y2="382" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5" fill="none"/>
  <text x="350" y="362" dominant-baseline="central" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px">ポート 8000（内部のみ）</text>

  <!-- Web container -->
  <g font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>
    <rect x="112" y="382" width="456" height="80" rx="8" fill="rgb(250, 238, 218)" stroke="rgb(133, 79, 11)" stroke-width="0.5"/>
    <text x="340" y="400" text-anchor="middle" dominant-baseline="central" fill="rgb(99, 56, 6)" font-size="14px" font-weight="500">web コンテナ（Gunicorn + Flask）</text>
    <text x="340" y="420" text-anchor="middle" dominant-baseline="central" fill="rgb(133, 79, 11)" font-size="12px">ghcr.io/horikawatakato/datecalc</text>
    <text x="340" y="440" text-anchor="middle" dominant-baseline="central" fill="rgb(133, 79, 11)" font-size="12px">アプリケーションロジック（Python 3.14）</text>
  </g>

  <!-- GHCR box (AWS の外) -->
  <g font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'>
    <rect x="40" y="580" width="600" height="64" rx="12" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)" stroke-width="0.5"/>
    <text x="340" y="602" text-anchor="middle" dominant-baseline="central" fill="rgb(68, 68, 65)" font-size="14px" font-weight="500">GHCR（GitHub Container Registry）</text>
    <text x="340" y="622" text-anchor="middle" dominant-baseline="central" fill="rgb(95, 94, 90)" font-size="12px">ghcr.io/horikawatakato/datecalc　|　ghcr.io/horikawatakato/datecalc-nginx</text>
  </g>

  <!-- Arrow: GHCR -> ECSタスク枠線 -->
  <line x1="340" y1="580" x2="340" y2="500" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5" fill="none"/>
  <text x="350" y="562" dominant-baseline="central" fill="rgb(61, 61, 58)" font-family='"Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="12px">イメージ取得</text>

</svg>
